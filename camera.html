<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ถ่ายรูป</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --panel: #111;
      --border: rgba(255,255,255,0.13); --text: #f0f0f0;
      --muted: #888; --hint: #444;
      --green: #44cc66; --red: #e22222;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }

    #app { height: 100dvh; display: flex; flex-direction: column; }

    /* ── Viewfinder ── */
    #vf-wrap {
      flex: 1; position: relative; background: #0d0d0d;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #video { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
    #video.rear { transform: scaleX(1); }

    #placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px 24px; text-align: center; }
    .cam-ring { width: 80px; height: 80px; border: 1.5px solid #2a2a2a; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: #111; }
    .ph-title { font-size: 15px; font-weight: 500; color: #777; }
    .ph-sub { font-size: 12px; color: var(--hint); line-height: 1.7; }

    #live-badge { position: absolute; top: 12px; left: 12px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--red); color: #fff; letter-spacing: 0.8px; display: none; animation: blink 1.8s infinite; z-index: 5; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.5} }

    #grid-overlay { position: absolute; inset: 0; display: none; z-index: 3; pointer-events: none; }
    #grid-overlay.show { display: block; }
    .gl { position: absolute; background: rgba(255,255,255,0.12); }
    .glh { left: 0; right: 0; height: .5px; }
    .glv { top: 0; bottom: 0; width: .5px; }

    #flash-overlay { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 20; transition: opacity .05s; }
    #flash-overlay.flash { opacity: .95; }
    canvas { display: none; }

    /* Preview overlay */
    #preview-overlay { position: absolute; inset: 0; background: #000; display: none; z-index: 10; }
    #preview-overlay.show { display: block; }
    #preview-img { width: 100%; height: 100%; object-fit: contain; }

    /* ── Settings Row ── */
    #settings-row { background: var(--panel); padding: 8px 14px; display: flex; align-items: center; gap: 8px; border-top: .5px solid var(--border); border-bottom: .5px solid var(--border); overflow-x: auto; flex-shrink: 0; }
    #settings-row::-webkit-scrollbar { display: none; }
    #device-select { background: rgba(255,255,255,.07); border: .5px solid var(--border); color: var(--text); font-size: 12px; padding: 7px 10px; border-radius: 8px; cursor: pointer; flex: 1; min-width: 0; -webkit-appearance: none; font-family: inherit; }
    #device-select option { background: #1a1a1a; color: #eee; }
    #device-select:disabled { opacity: .3; }
    .tbtn { background: rgba(255,255,255,.07); border: .5px solid var(--border); color: var(--muted); font-size: 12px; padding: 7px 13px; border-radius: 8px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background .15s, color .15s; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .tbtn.on { background: rgba(68,204,102,.15); border-color: rgba(68,204,102,.4); color: var(--green); }

    /* ── Controls ── */
    #controls { background: var(--panel); border-top: .5px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
    .cbtn { background: rgba(255,255,255,.07); border: .5px solid var(--border); color: var(--text); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s, transform .1s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .cbtn:hover { background: rgba(255,255,255,.13); }
    .cbtn:active { transform: scale(.91); }
    .cbtn:disabled { opacity: .28; cursor: not-allowed; transform: none; }
    #open-btn { background: rgba(255,255,255,.13); border-color: rgba(255,255,255,.35); }
    #open-btn.active { background: rgba(226,34,34,.18); border-color: rgba(226,34,34,.5); }
    #shutter-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,.9); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .1s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    #shutter-btn:active { transform: scale(.9); }
    #shutter-btn:disabled { opacity: .28; cursor: not-allowed; }
    #shutter-inner { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,.88); }

    /* ── Use Photo Bar ── */
    #use-photo-bar { display: none; background: #111; border-top: .5px solid var(--border); padding: 12px 16px; gap: 10px; flex-shrink: 0; }
    #use-photo-bar.show { display: flex; }
    .ubtn { flex: 1; height: 50px; border: none; border-radius: 12px; font-family: inherit; font-size: .95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-tap-highlight-color: transparent; }
    .ubtn:active { opacity: .8; transform: scale(.98); }
    #retake-btn { background: rgba(255,255,255,.1); color: var(--text); }
    #confirm-btn { background: var(--green); color: #fff; }

    /* ── Msg ── */
    #msg-bar { padding: 6px 16px; font-size: 12px; color: var(--muted); min-height: 28px; display: flex; align-items: center; background: var(--panel); border-top: .5px solid var(--border); flex-shrink: 0; }
    #msg-bar.error { color: #e66; }
    #msg-bar.success { color: var(--green); }

    /* ── Sent overlay ── */
    #sent-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50; gap: 16px; text-align: center; padding: 32px;
    }
    #sent-overlay.show { display: flex; }
    .sent-icon { width: 72px; height: 72px; background: rgba(68,204,102,.2); border: 2px solid rgba(68,204,102,.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sent-title { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .sent-sub { font-size: .875rem; color: rgba(255,255,255,.55); line-height: 1.6; }
    .close-btn-sent { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.8); font-family: inherit; font-size: .9rem; font-weight: 600; padding: 12px 32px; border-radius: 12px; cursor: pointer; margin-top: 4px; }
  </style>
</head>
<body>
<div id="app">

  <div id="vf-wrap">
    <span id="live-badge">● LIVE</span>
    <div id="grid-overlay">
      <div class="gl glh" style="top:33.3%"></div>
      <div class="gl glh" style="top:66.6%"></div>
      <div class="gl glv" style="left:33.3%"></div>
      <div class="gl glv" style="left:66.6%"></div>
    </div>
    <div id="placeholder">
      <div class="cam-ring">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="#444" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="#444" stroke-width="1.4"/>
        </svg>
      </div>
      <p class="ph-title">กดปุ่มเปิดกล้องเพื่อเริ่ม</p>
      <p class="ph-sub">iOS · Android · Desktop<br>ต้องใช้บน HTTPS</p>
    </div>
    <video id="video" autoplay playsinline muted webkit-playsinline></video>
    <div id="preview-overlay"><img id="preview-img" src="" alt=""></div>
    <canvas id="canvas"></canvas>
    <div id="flash-overlay"></div>
  </div>

  <div id="settings-row">
    <select id="device-select" disabled><option>เลือกกล้อง</option></select>
    <button class="tbtn" id="grid-btn" disabled>Grid</button>
    <button class="tbtn" id="mirror-btn" disabled>กระจก</button>
  </div>

  <div id="controls">
    <button class="cbtn" id="flip-btn" disabled>
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
        <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="cbtn" id="open-btn">
      <svg id="open-icon" width="22" height="22" fill="none" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>
      </svg>
    </button>

    <button id="shutter-btn" disabled>
      <div id="shutter-inner"></div>
    </button>

    <!-- placeholder ขวา -->
    <div style="width:48px;height:48px;flex-shrink:0;"></div>
    <div style="width:48px;height:48px;flex-shrink:0;"></div>
  </div>

  <div id="use-photo-bar">
    <button class="ubtn" id="retake-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M1 4v6h6M3.51 15a9 9 0 1017.3-5.31"/>
      </svg>
      ถ่ายใหม่
    </button>
    <button class="ubtn" id="confirm-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      ใช้รูปนี้
    </button>
  </div>

  <div id="msg-bar">กด "เปิดกล้อง" เพื่อเริ่มถ่ายรูป</div>

  <!-- ส่งรูปแล้ว -->
  <div id="sent-overlay">
    <div class="sent-icon">
      <svg width="32" height="32" fill="none" stroke="#44cc66" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <p class="sent-title">ส่งรูปกลับสำเร็จ!</p>
    <p class="sent-sub">รูปถูกส่งกลับไปยังฟอร์มแล้ว<br>คุณสามารถปิดหน้าต่างนี้ได้</p>
    <button class="close-btn-sent" onclick="window.close()">ปิดหน้าต่างนี้</button>
  </div>
</div>

<script>
  /* ═══════════════════════════════════════════════════
     ส่งรูปกลับผ่าน BroadcastChannel('field_camera_channel')
     index.html รอรับอยู่
     ═══════════════════════════════════════════════════ */
  const CHANNEL_NAME = 'field_camera_channel';

  const video          = document.getElementById('video');
  const canvas         = document.getElementById('canvas');
  const placeholder    = document.getElementById('placeholder');
  const shutterBtn     = document.getElementById('shutter-btn');
  const flipBtn        = document.getElementById('flip-btn');
  const openBtn        = document.getElementById('open-btn');
  const openIcon       = document.getElementById('open-icon');
  const gridBtn        = document.getElementById('grid-btn');
  const mirrorBtn      = document.getElementById('mirror-btn');
  const deviceSelect   = document.getElementById('device-select');
  const gridOverlay    = document.getElementById('grid-overlay');
  const flashOverlay   = document.getElementById('flash-overlay');
  const liveBadge      = document.getElementById('live-badge');
  const msgBar         = document.getElementById('msg-bar');
  const usePhotoBar    = document.getElementById('use-photo-bar');
  const previewOverlay = document.getElementById('preview-overlay');
  const previewImg     = document.getElementById('preview-img');
  const retakeBtn      = document.getElementById('retake-btn');
  const confirmBtn     = document.getElementById('confirm-btn');
  const sentOverlay    = document.getElementById('sent-overlay');

  let stream     = null;
  let devices    = [];
  let facingMode = 'user';
  let mirrorOn   = true;
  let gridOn     = false;
  let isOpen     = false;
  let capturedDataURL = null;

  const SVG_EYE = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>`;
  const SVG_X   = `<line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;

  function setMsg(text, type='') { msgBar.textContent=text; msgBar.className=type; }
  function flash() { flashOverlay.classList.add('flash'); setTimeout(()=>flashOverlay.classList.remove('flash'),130); }

  async function loadDevices() {
    try {
      const all = await navigator.mediaDevices.enumerateDevices();
      devices = all.filter(d=>d.kind==='videoinput');
      deviceSelect.innerHTML='';
      devices.forEach((d,i)=>{ const o=document.createElement('option'); o.value=d.deviceId; o.textContent=d.label||('กล้อง '+(i+1)); deviceSelect.appendChild(o); });
      deviceSelect.disabled = devices.length===0;
      flipBtn.disabled = devices.length<2;
    } catch(e){}
  }

  async function startCamera(deviceId) {
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    let constraints;
    if(deviceId){ constraints={video:{deviceId:{exact:deviceId}},audio:false}; }
    else {
      const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      constraints={video:isMobile?{facingMode}:true,audio:false};
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject=stream; video.style.display='block'; placeholder.style.display='none';
      updateMirror();
      await loadDevices();
      const track=stream.getVideoTracks()[0], s=track.getSettings();
      if(s.deviceId){ const o=deviceSelect.querySelector(`option[value="${s.deviceId}"]`); if(o) deviceSelect.value=s.deviceId; }
      liveBadge.style.display='inline'; shutterBtn.disabled=false; gridBtn.disabled=false; mirrorBtn.disabled=false;
      isOpen=true; openBtn.classList.add('active'); openIcon.innerHTML=SVG_X;
      setMsg('✓ เปิดกล้องสำเร็จ — '+(s.width||'?')+'×'+(s.height||'?')+'px','success');
    } catch(err) {
      let m='ไม่สามารถเปิดกล้องได้';
      if(err.name==='NotAllowedError') m='กรุณาอนุญาตการใช้กล้อง';
      else if(err.name==='NotFoundError') m='ไม่พบกล้องในอุปกรณ์';
      else if(err.name==='NotReadableError') m='กล้องถูกใช้งานโดยแอปอื่น';
      else if(err.name==='SecurityError'||err.name==='NotSupportedError') m='ต้องใช้บน HTTPS';
      setMsg('⚠ '+m,'error');
    }
  }

  function stopCamera() {
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    video.srcObject=null; video.style.display='none'; placeholder.style.display='flex';
    liveBadge.style.display='none'; shutterBtn.disabled=true; flipBtn.disabled=true;
    gridBtn.disabled=true; mirrorBtn.disabled=true; isOpen=false;
    openBtn.classList.remove('active'); openIcon.innerHTML=SVG_EYE; setMsg('ปิดกล้องแล้ว');
  }

  function updateMirror() {
    const isRear=facingMode==='environment';
    video.style.transform=(mirrorOn&&!isRear)?'scaleX(-1)':'scaleX(1)';
    mirrorBtn.classList.toggle('on',mirrorOn);
  }

  openBtn.addEventListener('click',()=>{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setMsg('⚠ ต้องใช้บน HTTPS','error');return;}
    if(!isOpen) startCamera(); else stopCamera();
  });

  flipBtn.addEventListener('click',()=>{
    const opts=Array.from(deviceSelect.options), cur=opts.findIndex(o=>o.value===deviceSelect.value);
    const next=(cur+1)%devices.length;
    deviceSelect.selectedIndex=next; facingMode=facingMode==='user'?'environment':'user';
    startCamera(devices[next]?.deviceId);
  });

  deviceSelect.addEventListener('change',()=>{ if(isOpen) startCamera(deviceSelect.value); });

  gridBtn.addEventListener('click',()=>{ gridOn=!gridOn; gridOverlay.classList.toggle('show',gridOn); gridBtn.classList.toggle('on',gridOn); });
  mirrorBtn.addEventListener('click',()=>{ mirrorOn=!mirrorOn; updateMirror(); });

  /* ── Capture ── */
  shutterBtn.addEventListener('click',()=>{
    if(!stream) return;
    const track=stream.getVideoTracks()[0], s=track.getSettings();
    canvas.width=s.width||video.videoWidth||1280; canvas.height=s.height||video.videoHeight||720;
    const ctx=canvas.getContext('2d'), shouldMirror=mirrorOn&&facingMode!=='environment';
    if(shouldMirror){ctx.save();ctx.translate(canvas.width,0);ctx.scale(-1,1);}
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    if(shouldMirror) ctx.restore();
    flash();
    capturedDataURL=canvas.toDataURL('image/jpeg',0.92);
    previewImg.src=capturedDataURL;
    previewOverlay.classList.add('show');
    usePhotoBar.classList.add('show');
    shutterBtn.disabled=true;
    setMsg('ตรวจสอบรูป แล้วกด "ใช้รูปนี้"','success');
  });

  retakeBtn.addEventListener('click',()=>{
    capturedDataURL=null;
    previewOverlay.classList.remove('show');
    usePhotoBar.classList.remove('show');
    shutterBtn.disabled=false;
    setMsg('พร้อมถ่ายอีกครั้ง');
  });

  /* ══════════════════════════════════════════════════
     ใช้รูปนี้ → BroadcastChannel ส่งกลับ index.html
     ══════════════════════════════════════════════════ */
  confirmBtn.addEventListener('click',()=>{
    if(!capturedDataURL) return;

    const ch = new BroadcastChannel(CHANNEL_NAME);
    ch.postMessage({ type: 'PHOTO_CAPTURED', data: capturedDataURL });
    ch.close();

    // แสดง sent overlay
    sentOverlay.classList.add('show');
    setMsg('✓ ส่งรูปกลับสำเร็จ','success');

    // reset state
    capturedDataURL=null;
    previewOverlay.classList.remove('show');
    usePhotoBar.classList.remove('show');
    shutterBtn.disabled=false;

    // ปิด tab อัตโนมัติหลัง 2 วินาที (ถ้าเบราว์เซอร์ยอมให้)
    setTimeout(()=>{ try{ window.close(); }catch(e){} }, 2000);
  });

  document.addEventListener('keydown',e=>{
    if(e.code==='Space'&&isOpen&&!shutterBtn.disabled){e.preventDefault();shutterBtn.click();}
    if(e.code==='KeyO') openBtn.click();
    if(e.code==='KeyF'&&isOpen) flipBtn.click();
    if(e.code==='Escape'&&capturedDataURL) retakeBtn.click();
    if(e.code==='Enter'&&capturedDataURL) confirmBtn.click();
  });

  document.addEventListener('visibilitychange',()=>{ if(document.hidden&&isOpen) stopCamera(); });
</script>
</body>
</html>
