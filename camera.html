<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Camera</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --border: rgba(255,255,255,0.13);
      --text: #f0f0f0;
      --muted: #888;
      --hint: #444;
      --green: #44cc66;
      --red: #e22222;
    }
    html, body {
      height: 100%; background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── Viewfinder ── */
    #viewfinder-wrap {
      flex: 1;
      position: relative;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      transform: scaleX(-1);
    }
    #video.rear { transform: scaleX(1); }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
    }
    .cam-ring {
      width: 80px; height: 80px;
      border: 1.5px solid #2a2a2a;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      background: #111;
    }
    .placeholder-title { font-size: 15px; font-weight: 500; color: #777; }
    .placeholder-sub { font-size: 12px; color: var(--hint); line-height: 1.7; }

    /* Overlays */
    #live-badge {
      position: absolute; top: 12px; left: 12px;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      background: var(--red); color: #fff;
      letter-spacing: 0.8px; display: none;
      animation: blink 1.8s infinite; z-index: 5;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    #grid-overlay {
      position: absolute; inset: 0; display: none; z-index: 3; pointer-events: none;
    }
    #grid-overlay.show { display: block; }
    .grid-line { position: absolute; background: rgba(255,255,255,0.12); }
    .grid-h { left: 0; right: 0; height: 0.5px; }
    .grid-v { top: 0; bottom: 0; width: 0.5px; }

    #flash-overlay {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      pointer-events: none; z-index: 20;
      transition: opacity 0.05s;
    }
    #flash-overlay.flash { opacity: 0.95; }

    canvas { display: none; }

    /* ── Controls ── */
    #controls {
      background: var(--panel);
      border-top: 0.5px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.13); }
    .ctrl-btn:active { transform: scale(0.91); }
    .ctrl-btn:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }

    #open-btn {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.35);
    }
    #open-btn.active {
      background: rgba(226,34,34,0.18);
      border-color: rgba(226,34,34,0.5);
    }

    #shutter-btn {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.9);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #shutter-btn:active { transform: scale(0.9); }
    #shutter-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    #shutter-inner {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
    }

    /* ── Settings Row ── */
    #settings-row {
      background: var(--panel);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 0.5px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }
    #settings-row::-webkit-scrollbar { display: none; }
    #device-select {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      flex: 1; min-width: 0;
      -webkit-appearance: none;
    }
    #device-select option { background: #1a1a1a; color: #eee; }
    #device-select:disabled { opacity: 0.3; }
    .toggle-btn {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.on {
      background: rgba(68,204,102,0.15);
      border-color: rgba(68,204,102,0.4);
      color: var(--green);
    }

    /* ── Message ── */
    #msg-bar {
      padding: 6px 16px;
      font-size: 12px;
      color: var(--muted);
      min-height: 30px;
      display: flex;
      align-items: center;
      background: var(--panel);
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    #msg-bar.error { color: #e66; }
    #msg-bar.success { color: var(--green); }

    /* ── Use Photo Bar ── */
    #use-photo-bar {
      display: none;
      background: #111;
      border-top: 0.5px solid var(--border);
      padding: 12px 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    #use-photo-bar.show { display: flex; }
    .use-btn {
      flex: 1; height: 50px;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .use-btn:active { opacity: 0.8; transform: scale(0.98); }
    #retake-btn { background: rgba(255,255,255,0.1); color: var(--text); }
    #confirm-btn { background: var(--green); color: #fff; }

    /* ── Preview overlay ── */
    #preview-overlay {
      position: absolute; inset: 0;
      background: #000;
      display: none; z-index: 10;
    }
    #preview-overlay.show { display: block; }
    #preview-img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="viewfinder-wrap">
    <span id="live-badge">● LIVE</span>
    <div id="grid-overlay">
      <div class="grid-line grid-h" style="top:33.3%"></div>
      <div class="grid-line grid-h" style="top:66.6%"></div>
      <div class="grid-line grid-v" style="left:33.3%"></div>
      <div class="grid-line grid-v" style="left:66.6%"></div>
    </div>
    <div id="placeholder">
      <div class="cam-ring">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
            stroke="#444" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="#444" stroke-width="1.4"/>
        </svg>
      </div>
      <p class="placeholder-title">กดปุ่มเปิดกล้องเพื่อเริ่ม</p>
      <p class="placeholder-sub">iOS · Android · Desktop</p>
    </div>
    <video id="video" autoplay playsinline muted webkit-playsinline></video>
    <div id="preview-overlay">
      <img id="preview-img" src="" alt="preview">
    </div>
    <canvas id="canvas"></canvas>
    <div id="flash-overlay"></div>
  </div>

  <div id="settings-row">
    <select id="device-select" disabled>
      <option>เลือกกล้อง</option>
    </select>
    <button class="toggle-btn" id="grid-btn" disabled>Grid</button>
    <button class="toggle-btn" id="mirror-btn" disabled>กระจก</button>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="flip-btn" title="สลับกล้อง" disabled>
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
        <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="1.7"
          stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"
          stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="ctrl-btn" id="open-btn" title="เปิดกล้อง">
      <svg id="open-icon" width="22" height="22" fill="none" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
          stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>
      </svg>
    </button>

    <button id="shutter-btn" title="ถ่ายภาพ" disabled>
      <div id="shutter-inner"></div>
    </button>

    <select id="device-select-ctrl" disabled style="
      background:rgba(255,255,255,0.07);
      border:0.5px solid rgba(255,255,255,0.13);
      color:#ccc; font-size:11px;
      padding:6px 10px; border-radius:8px;
      cursor:pointer; max-width:110px;
      -webkit-appearance:none;
      display:none;
    "></select>

    <!-- placeholder slot -->
    <div style="width:48px;height:48px;flex-shrink:0;"></div>
  </div>

  <!-- ใช้รูปนี้ / ถ่ายใหม่ -->
  <div id="use-photo-bar">
    <button class="use-btn" id="retake-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M1 4v6h6M3.51 15a9 9 0 1017.3-5.31"/>
      </svg>
      ถ่ายใหม่
    </button>
    <button class="use-btn" id="confirm-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      ใช้รูปนี้
    </button>
  </div>

  <div id="msg-bar">รองรับ iOS · Android · Desktop — ต้องใช้บน HTTPS</div>
</div>

<script>
  const video        = document.getElementById('video');
  const canvas       = document.getElementById('canvas');
  const placeholder  = document.getElementById('placeholder');
  const shutterBtn   = document.getElementById('shutter-btn');
  const flipBtn      = document.getElementById('flip-btn');
  const openBtn      = document.getElementById('open-btn');
  const openIcon     = document.getElementById('open-icon');
  const gridBtn      = document.getElementById('grid-btn');
  const mirrorBtn    = document.getElementById('mirror-btn');
  const deviceSelect = document.getElementById('device-select');
  const gridOverlay  = document.getElementById('grid-overlay');
  const flashOverlay = document.getElementById('flash-overlay');
  const liveBadge    = document.getElementById('live-badge');
  const msgBar       = document.getElementById('msg-bar');
  const usePhotoBar  = document.getElementById('use-photo-bar');
  const previewOverlay = document.getElementById('preview-overlay');
  const previewImg   = document.getElementById('preview-img');
  const retakeBtn    = document.getElementById('retake-btn');
  const confirmBtn   = document.getElementById('confirm-btn');

  let stream     = null;
  let devices    = [];
  let facingMode = 'user';
  let mirrorOn   = true;
  let gridOn     = false;
  let isOpen     = false;
  let capturedDataURL = null;

  function setMsg(text, type = '') {
    msgBar.textContent = text;
    msgBar.className = type;
  }
  function flash() {
    flashOverlay.classList.add('flash');
    setTimeout(() => flashOverlay.classList.remove('flash'), 130);
  }

  async function loadDevices() {
    try {
      const all = await navigator.mediaDevices.enumerateDevices();
      devices = all.filter(d => d.kind === 'videoinput');
      deviceSelect.innerHTML = '';
      devices.forEach((d, i) => {
        const o = document.createElement('option');
        o.value = d.deviceId;
        o.textContent = d.label || ('กล้อง ' + (i + 1));
        deviceSelect.appendChild(o);
      });
      deviceSelect.disabled = devices.length === 0;
      flipBtn.disabled = devices.length < 2;
    } catch(e) {}
  }

  async function startCamera(deviceId) {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    let constraints;
    if (deviceId) {
      constraints = { video: { deviceId: { exact: deviceId } }, audio: false };
    } else {
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      constraints = {
        video: isMobile ? { facingMode } : true,
        audio: false
      };
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      updateMirror();
      await loadDevices();
      const track = stream.getVideoTracks()[0];
      const s = track.getSettings();
      liveBadge.style.display = 'inline';
      shutterBtn.disabled = false;
      gridBtn.disabled = false;
      mirrorBtn.disabled = false;
      isOpen = true;
      openBtn.classList.add('active');
      openIcon.innerHTML = SVG_X;
      setMsg('✓ เปิดกล้องสำเร็จ — ' + (s.width||'?') + '×' + (s.height||'?') + 'px', 'success');
    } catch(err) {
      let m = 'ไม่สามารถเปิดกล้องได้';
      if (err.name === 'NotAllowedError')   m = 'กรุณาอนุญาตการใช้กล้อง';
      if (err.name === 'NotFoundError')     m = 'ไม่พบกล้องในอุปกรณ์';
      if (err.name === 'NotReadableError')  m = 'กล้องถูกใช้งานโดยแอปอื่น';
      if (err.name === 'SecurityError' || err.name === 'NotSupportedError')
                                            m = 'ต้องใช้บน HTTPS';
      setMsg('⚠ ' + m, 'error');
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    video.style.display = 'none';
    placeholder.style.display = 'flex';
    liveBadge.style.display = 'none';
    shutterBtn.disabled = true;
    flipBtn.disabled = true;
    gridBtn.disabled = true;
    mirrorBtn.disabled = true;
    isOpen = false;
    openBtn.classList.remove('active');
    openIcon.innerHTML = SVG_EYE;
    setMsg('ปิดกล้องแล้ว');
  }

  function updateMirror() {
    const isRear = facingMode === 'environment';
    video.style.transform = (mirrorOn && !isRear) ? 'scaleX(-1)' : 'scaleX(1)';
    mirrorBtn.classList.toggle('on', mirrorOn);
  }

  const SVG_EYE = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
      stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>`;
  const SVG_X = `<line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;

  openBtn.addEventListener('click', () => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setMsg('⚠ ต้องใช้บน HTTPS', 'error'); return;
    }
    if (!isOpen) startCamera();
    else stopCamera();
  });

  flipBtn.addEventListener('click', () => {
    const opts = Array.from(deviceSelect.options);
    const cur = opts.findIndex(o => o.value === deviceSelect.value);
    const next = (cur + 1) % devices.length;
    deviceSelect.selectedIndex = next;
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera(devices[next]?.deviceId);
  });

  deviceSelect.addEventListener('change', () => {
    if (isOpen) startCamera(deviceSelect.value);
  });

  gridBtn.addEventListener('click', () => {
    gridOn = !gridOn;
    gridOverlay.classList.toggle('show', gridOn);
    gridBtn.classList.toggle('on', gridOn);
  });

  mirrorBtn.addEventListener('click', () => {
    mirrorOn = !mirrorOn;
    updateMirror();
  });

  /* ── Capture ── */
  shutterBtn.addEventListener('click', () => {
    if (!stream) return;
    const track = stream.getVideoTracks()[0];
    const s = track.getSettings();
    canvas.width  = s.width  || video.videoWidth  || 1280;
    canvas.height = s.height || video.videoHeight || 720;
    const ctx = canvas.getContext('2d');
    const shouldMirror = mirrorOn && facingMode !== 'environment';
    if (shouldMirror) { ctx.save(); ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    if (shouldMirror) ctx.restore();
    flash();
    capturedDataURL = canvas.toDataURL('image/jpeg', 0.92);

    // แสดง preview
    previewImg.src = capturedDataURL;
    previewOverlay.classList.add('show');
    usePhotoBar.classList.add('show');
    shutterBtn.disabled = true;
    setMsg('ตรวจสอบรูป แล้วกด "ใช้รูปนี้"', 'success');
  });

  /* ── Retake ── */
  retakeBtn.addEventListener('click', () => {
    capturedDataURL = null;
    previewOverlay.classList.remove('show');
    usePhotoBar.classList.remove('show');
    shutterBtn.disabled = false;
    setMsg('พร้อมถ่ายอีกครั้ง');
  });

  /* ══════════════════════════════════════════
     ใช้รูปนี้ → postMessage กลับไปหน้าหลัก
     ══════════════════════════════════════════ */
  confirmBtn.addEventListener('click', () => {
    if (!capturedDataURL) return;
    // ส่งรูปกลับไปยัง parent (index.html) ผ่าน postMessage
    window.parent.postMessage(
      { type: 'PHOTO_CAPTURED', data: capturedDataURL },
      '*'
    );
    setMsg('✓ ส่งรูปกลับแล้ว...', 'success');
    // reset
    capturedDataURL = null;
    previewOverlay.classList.remove('show');
    usePhotoBar.classList.remove('show');
    shutterBtn.disabled = false;
  });

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && isOpen && !shutterBtn.disabled) { e.preventDefault(); shutterBtn.click(); }
    if (e.code === 'KeyO') openBtn.click();
    if (e.code === 'KeyF' && isOpen) flipBtn.click();
    if (e.code === 'Escape' && capturedDataURL) retakeBtn.click();
    if (e.code === 'Enter' && capturedDataURL) confirmBtn.click();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && isOpen) stopCamera();
  });

  setMsg('กด "เปิดกล้อง" เพื่อเริ่มถ่ายรูป');
</script>
</body>
</html>
