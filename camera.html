<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Camera</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;height:100dvh;background:#000;overflow:hidden;font-family:'Sarabun',sans-serif}

#camVideo{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;background:#000;
}

/* grid overlay */
.grid{position:fixed;inset:0;z-index:5;pointer-events:none;
  display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr}
.grid span{border:.5px solid rgba(255,255,255,.07)}

/* top bar */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:12px 16px;
  padding-top:max(env(safe-area-inset-top,0px),12px);
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  display:flex;align-items:center;justify-content:space-between;
}
.top-title{color:rgba(255,255,255,.75);font-size:.82rem;letter-spacing:2px;text-transform:uppercase}

/* bottom bar */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:16px 32px;
  padding-bottom:max(env(safe-area-inset-bottom,0px),20px);
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
  display:flex;align-items:center;justify-content:space-between;
}

/* icon button */
.btn-icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,.2);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s,transform .1s;
}
.btn-icon:active{background:rgba(255,255,255,.2);transform:scale(.9)}
.btn-icon.ghost{visibility:hidden;pointer-events:none}

/* shutter */
.btn-shutter{
  width:76px;height:76px;border-radius:50%;
  background:transparent;border:4px solid rgba(255,255,255,.9);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  position:relative;transition:transform .1s;
}
.btn-shutter::after{
  content:'';width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.92);transition:transform .12s,background .12s;
}
.btn-shutter:active{transform:scale(.9)}
.btn-shutter:active::after{background:#ccc;transform:scale(.9)}

/* flash */
#flash{position:fixed;inset:0;z-index:40;background:#fff;opacity:0;pointer-events:none;transition:opacity .06s}
#flash.on{opacity:1}

/* ── START SCREEN (Android needs user gesture to allow camera) ── */
#startScreen{
  position:fixed;inset:0;z-index:50;
  background:linear-gradient(160deg,#0d0f14 0%,#161a22 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;padding:32px;text-align:center;
}
#startScreen .icon{font-size:4rem;color:#f5a623;margin-bottom:20px;opacity:.9}
#startScreen h2{font-size:1.2rem;font-weight:700;color:#e8ecf4;margin-bottom:8px}
#startScreen p{font-size:.85rem;color:#6b7591;line-height:1.7;max-width:260px;margin-bottom:28px}
.btn-start{
  background:linear-gradient(135deg,#f5a623,#e8951a);
  border:none;color:#000;
  font-size:1rem;font-weight:700;letter-spacing:1px;
  padding:16px 40px;border-radius:14px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:10px;
  transition:transform .1s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(245,166,35,.35);
}
.btn-start:active{transform:scale(.95)}
.btn-start i{font-size:1.2rem}

/* loading */
#loadingScreen{
  position:fixed;inset:0;z-index:45;
  background:#000;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  color:rgba(255,255,255,.6);font-size:.88rem;
}
#loadingScreen .spin{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.85);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* error */
#errorScreen{
  position:fixed;inset:0;z-index:55;
  background:#0d0f14;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:32px;text-align:center;color:#e8ecf4;
}
#errorScreen .err-icon{font-size:3.5rem;color:#e8341a}
#errorScreen h3{font-size:1.1rem;font-weight:700}
#errorScreen p{font-size:.82rem;color:#6b7591;line-height:1.7;max-width:280px}
.btn-retry{
  background:#f5a623;border:none;color:#000;
  border-radius:12px;padding:13px 28px;
  font-size:.95rem;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn-close-err{
  background:transparent;border:1.5px solid #2a3040;color:#6b7591;
  border-radius:12px;padding:11px 24px;
  font-size:.88rem;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>

<video id="camVideo" autoplay playsinline muted></video>
<div class="grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
<div id="flash"></div>

<!-- ── START SCREEN: user must tap to trigger permission on Android ── -->
<div id="startScreen">
  <div class="icon"><i class="bi bi-camera-fill"></i></div>
  <h2>เปิดกล้องถ่ายรูป</h2>
  <p>กดปุ่มด้านล่างเพื่อเปิดกล้องและอนุญาตการเข้าถึง</p>
  <button class="btn-start" onclick="startCamera()">
    <i class="bi bi-camera-fill"></i> เปิดกล้อง
  </button>
</div>

<!-- Loading -->
<div id="loadingScreen">
  <div class="spin"></div>
  <div>กำลังเปิดกล้อง...</div>
</div>

<!-- Error -->
<div id="errorScreen">
  <div class="err-icon"><i class="bi bi-camera-video-off-fill"></i></div>
  <h3 id="errTitle">ไม่สามารถเปิดกล้องได้</h3>
  <p id="errDetail">เกิดข้อผิดพลาด</p>
  <button class="btn-retry" onclick="retryCamera()">ลองใหม่</button>
  <button class="btn-close-err" onclick="window.close()">ปิด</button>
</div>

<!-- Top bar (hidden until camera live) -->
<div class="top-bar" id="topBar" style="display:none">
  <button class="btn-icon" onclick="closeCam()"><i class="bi bi-x-lg"></i></button>
  <span class="top-title">ถ่ายรูป</span>
  <button class="btn-icon" id="btnFlip" onclick="flipCam()"><i class="bi bi-arrow-repeat"></i></button>
</div>

<!-- Bottom bar (hidden until camera live) -->
<div class="bottom-bar" id="bottomBar" style="display:none">
  <div class="btn-icon ghost"></div>
  <button class="btn-shutter" onclick="capture()"></button>
  <div class="btn-icon ghost"></div>
</div>

<canvas id="snapCanvas" style="display:none"></canvas>

<script>
const params = new URLSearchParams(location.search);
const ORIGIN = params.get('origin') || '*';
let stream = null, facing = 'environment', busy = false;

function show(id,flex){ const el=document.getElementById(id); el.style.display=flex?'flex':'block'; }
function hide(id){ document.getElementById(id).style.display='none'; }

// ── startCamera: called by user tap (required for Android permission) ──
async function startCamera(facingMode) {
  if(!facingMode) facingMode = facing;
  facing = facingMode;

  hide('startScreen');
  hide('errorScreen');
  show('loadingScreen', true);

  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }

  // try with ideal facingMode first, then fallback to any video
  let s;
  try {
    s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:facingMode}, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
  } catch(e1) {
    try {
      s = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    } catch(e2) {
      hide('loadingScreen');
      showError(e2);
      return;
    }
  }

  stream = s;
  const video = document.getElementById('camVideo');
  video.srcObject = stream;
  try{ await video.play(); }catch(e){}

  // mirror front cam
  video.style.transform = (facingMode==='user') ? 'scaleX(-1)' : 'none';

  hide('loadingScreen');
  show('topBar', false);
  show('bottomBar', false);

  // flip button visibility
  try{
    const devs = await navigator.mediaDevices.enumerateDevices();
    const cams = devs.filter(d=>d.kind==='videoinput');
    document.getElementById('btnFlip').style.visibility = cams.length>1 ? 'visible' : 'hidden';
  }catch(e){ document.getElementById('btnFlip').style.visibility='hidden'; }
}

async function flipCam(){
  facing = facing==='environment' ? 'user' : 'environment';
  await startCamera(facing);
}

function capture(){
  if(busy) return; busy=true;
  const flash=document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(()=>flash.classList.remove('on'),120);

  const video=document.getElementById('camVideo');
  const canvas=document.getElementById('snapCanvas');
  const w=video.videoWidth||1280, h=video.videoHeight||720;
  canvas.width=w; canvas.height=h;
  const ctx=canvas.getContext('2d');
  if(facing==='user'){ ctx.translate(w,0); ctx.scale(-1,1); }
  ctx.drawImage(video,0,0,w,h);
  const dataUrl = canvas.toDataURL('image/jpeg',0.88);

  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }

  if(window.opener){
    try{ window.opener.postMessage({type:'CAM_PHOTO',dataUrl},ORIGIN); }
    catch(e){ window.opener.postMessage({type:'CAM_PHOTO',dataUrl},'*'); }
  }
  setTimeout(()=>window.close(),150);
}

function closeCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  if(window.opener) window.opener.postMessage({type:'CAM_CANCEL'},'*');
  window.close();
}

function retryCamera(){ show('startScreen',true); }

function showError(err){
  console.error('Camera:',err.name,err.message);
  let title='ไม่สามารถเปิดกล้องได้', detail=err.message;
  if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){
    title='ไม่ได้รับอนุญาตเข้าถึงกล้อง';
    detail='กรุณากด "อนุญาต" เมื่อเบราว์เซอร์ถาม หรือไปที่ตั้งค่าเบราว์เซอร์เพื่อเปิดสิทธิ์กล้อง';
  } else if(err.name==='NotFoundError'){
    title='ไม่พบกล้อง'; detail='อุปกรณ์นี้ไม่มีกล้องที่ใช้งานได้';
  } else if(err.name==='NotReadableError'){
    title='กล้องถูกใช้งานอยู่'; detail='ปิดแอปอื่นที่ใช้กล้องอยู่แล้วลองใหม่';
  }
  document.getElementById('errTitle').textContent=title;
  document.getElementById('errDetail').textContent=detail;
  show('errorScreen',true);
}

window.addEventListener('beforeunload',()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); });
</script>
</body>
</html>
